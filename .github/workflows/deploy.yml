name: deploy

on:

 push:

  branches:

   - main


jobs:

 build:

  runs-on:
   ubuntu-latest


  steps:

  - uses:
      actions/checkout@v4


  - uses:
      docker/setup-buildx-action@v3


  - uses:
      docker/login-action@v3

    with:

     username:
      ${{ secrets.DOCKER_USERNAME }}

     password:
      ${{ secrets.DOCKER_PASSWORD }}


  - name:
      Build Frontend

    run: |

      docker build \
      -t \
      ${{ secrets.DOCKER_USERNAME }}/frontend:latest \
      ./frontend


      docker push \
      ${{ secrets.DOCKER_USERNAME }}/frontend:latest


  - name:
      Build Auth

    run: |

      docker build \
      -t \
      ${{ secrets.DOCKER_USERNAME }}/auth-service:latest \
      ./services/auth-service


      docker push \
      ${{ secrets.DOCKER_USERNAME }}/auth-service:latest
