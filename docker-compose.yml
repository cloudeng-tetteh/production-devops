services:

 frontend:

  build:
   ./frontend

  ports:
   - "3000:5173"

  depends_on:
   - auth


 auth:

  build:
   ./services/auth-service

  ports:
   - "5000:5000"

  depends_on:
   - db

  env_file:
   - ./services/auth-service/.env


 db:

  image:
   postgres:16

  environment:

   POSTGRES_USER:
    postgres

   POSTGRES_PASSWORD:
    postgres

   POSTGRES_DB:
    authdb

  ports:

   - "5432:5432"
